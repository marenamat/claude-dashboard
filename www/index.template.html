<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Dashboard</title>
  <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand">Claude Dashboard</span>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto" id="project-nav">
        {{NAV_ITEMS}}
      </ul>
      <a class="navbar-text nav-link small text-secondary me-3"
         href="https://github.com/marenamat/claude-dashboard/issues"
         target="_blank" rel="noopener noreferrer">Report bug</a>
      <span class="navbar-text small text-secondary" id="generated-at">
        Generated: {{GENERATED_AT}}
      </span>
    </div>
  </div>
</nav>

<main class="container-fluid py-4">

  <noscript>
    <div class="alert alert-info">JavaScript is disabled. Showing static data.</div>
  </noscript>

  <div id="dash-content" class="row g-3">
    {{PROJECT_SECTIONS}}
  </div>

</main>

<script src="dashboard.js" defer></script>
</body>
</html>
