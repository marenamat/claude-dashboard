ci_status:
  main: Package CI fails consistently at "Build Alpine APK" step (~3 seconds).
        ROOT CAUSE CONFIRMED: abuild-keygen sets SUDO via
          SUDO="${SUDO-$(command -v doas || command -v sudo || echo doas)}"
        In a minimal Alpine 3.21 container (only abuild installed, no doas/sudo),
        SUDO becomes the literal string "doas". The -i flag causes it to run
          "doas mkdir -p /etc/apk/keys"
        which fails with exit 127 ("doas: not found") → set -e exits → step fails.
        FIX: branch issue-14-ci-debug removes -i and manually copies pub key as root
        (root needs no sudo). Branch is pending guardian review/merge.

