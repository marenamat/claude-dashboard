ci_status:
  main: Package CI consistently failing at "Build Alpine APK" since the beginning.
        PREVIOUS FIX (export SUDO=) was ineffective: abuild 3.14.1 (Alpine 3.21)
        uses SUDO_APK / abuild-apk, not $SUDO, so that fix addressed a
        non-existent problem.
        NEW ROOT CAUSE: abuild -Fr calls builddeps() which runs
          abuild-apk add --repository /out/ --virtual .makedepends-claude-dashboard
          build-base python3 py3-cbor2 py3-yaml py3-websockets
        This fails (likely /out/ is not a valid apk repo at start, and/or
        installing build-base in the container causes issues).
        NEW FIX: branch issue-14-nodeps uses 'abuild -F -d' instead of -Fr.
          -F  allow running as root
          -d  skip makedepends/depends installation entirely
        Our APKBUILD has no makedepends and build() is a no-op, so no build
        tools are needed at build time. Runtime deps (depends=) are installed
        by apk on the target system.

