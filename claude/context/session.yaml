session_2026-04-18e:
  - Diagnosed issue #9 WS 426 error: APKBUILD was installing nginx/clanker.conf
    (a standalone full nginx config with http {} wrapper) as the package's nginx
    snippet. Copying that into /etc/nginx/http.d/ would cause nginx to fail with
    nested http {} blocks, and /ws would fall through to the static handler
    returning 426 Upgrade Required.
  - Fixed APKBUILD: now installs packaging/clanker.conf (the http.d-style snippet
    with only a server {} block) instead of nginx/clanker.conf.
  - Fixed packaging/clanker.conf comment: config path was /usr/share/claude-dashboard/
    config.yaml but scripts use /etc/claude-dashboard/config.yaml.
  - Updated questions.md to explain the bug and updated post-install steps.
  - issue #16 clone commands: found duplicate clanker remote bug — when source machine
    has a clanker remote it was being added twice. Fixed by excluding 'clanker' from
    upstream_remotes in make_clone_commands(). Branch: issue-16-fix-clone-commands.
  - issue #22 denied permissions: cannot show full tool-call args because Claude Code
    CLI only logs the tool name (not args) when denying. Requires clanker-run changes
    in claude-base to capture tool input from --output-format=stream-json. Documented
    in questions.md. Branch: issue-22-denied-permissions.
  - questions.md open questions (still pending guardian action):
