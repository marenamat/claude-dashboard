session_2026-04-05_fix:
  - CI build was failing on main (run 24007256620).
  - Root cause: src/lib.rs had two type errors in CBOR conversion helpers:
      1. val_as_f64: `(*i).into()` tried Integer -> f64, which ciborium doesn't provide.
         Fixed to use i64::try_from(*i).ok().map(|n| n as f64).
      2. val_as_u64: manual i128 intermediate (`(*i).into()`) replaced with
         u64::try_from(*i).ok() (cleaner and correct).
  - Removed dead-code structs DashboardData / Run / Project and unused
    `use serde::Deserialize` + serde dependency from Cargo.toml.
  - Local main still diverges from origin/main; human guardian handles push.
session_2026-04-05_nginx_ipv6:
  - nginx/dashboard.conf had IPv6 listen commented out, violating the project's
    mandatory IPv6 requirement. Fixed: enabled `listen [::]:8042;`.
session_2026-04-05_ci_robustness:
  - CI (run 24007632861) still failing on main after Rust fix b3b8938.
  - Cannot obtain detailed logs via public API (no auth token).
  - Code analysis: Rust code is correct; ciborium TryFrom<Integer> for i64/u64
    IS implemented via implfrom! macro. Python script works locally.
  - Improvements made (on issue-1-base-implementation branch):
      1. Added actions/cache@v4 for ~/.cargo/registry to speed CI and reduce
