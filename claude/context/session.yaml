  main: Package CI still failing after the abuild-keygen fix.
        NEW ROOT CAUSE: abuild -r (install build deps) uses the same
          SUDO="${SUDO-$(command -v doas || command -v sudo || echo doas)}"
        pattern internally. With only abuild+fakeroot installed and no
        doas/sudo, every $SUDO apk add call becomes "doas apk add ..."
        which exits 127.
        FIX: branch issue-14-sudo-fix adds "export SUDO=" before any abuild
        invocation and installs fakeroot alongside abuild, so the container
        runs all apk ops directly as root without a sudo wrapper.
        Branch is pending guardian review/merge.

