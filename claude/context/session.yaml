session_2026-04-05_fix:
  - CI build was failing on main (run 24007256620).
  - Root cause: src/lib.rs had two type errors in CBOR conversion helpers:
      1. val_as_f64: `(*i).into()` tried Integer -> f64, which ciborium doesn't provide.
         Fixed to use i64::try_from(*i).ok().map(|n| n as f64).
      2. val_as_u64: manual i128 intermediate (`(*i).into()`) replaced with
         u64::try_from(*i).ok() (cleaner and correct).
  - Removed dead-code structs DashboardData / Run / Project and unused
    `use serde::Deserialize` + serde dependency from Cargo.toml.
  - Local main still diverges from origin/main; human guardian handles push.
