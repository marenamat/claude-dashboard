issues:
- author: marenamat
  body: "Create a tool which would spawn new repositories.\n\nEvery issue in this\
    \ repository marked with the label ~SPAWN is to become a completely new project.\n\
    \nThe issue needs to have a line \"Name: foobar\" where foobar is the name of\
    \ the directory and also repository. The name must not contain any weird unsafe\
    \ characters. \n\nThe tool creates a directory under ~/claude/ (must be configurable),\
    \ clones `claude-base` there, adds the directory into the dashboard, and adds\
    \ a standard crontab job to run claude-run in that directory, every 30 minutes,\
    \ at a preselected random minute between 7 and 25 (and 37 to 55).\n\nThe issue\
    \ text should be downloaded and put into claude/design/original-issue.json.\n\n\
    The issue may have a line \"Upstream: url\" which points to a git repository to\
    \ merge with claude-base to create the project.\n\nThe tool is expected to run\
    \ every 5 minutes from a crontab, and is not expected to run claude itself, pure\
    \ python. All errors should be reported via the dashboard."
  comments: []
  created_at: '2026-04-16T21:19:35Z'
