# nginx/clanker.conf for the Alpine linux package of claude-dashboard.
# Installed to /usr/share/claude-dashboard/nginx/clanker.conf.
# Serves the dashboard www/ directory over plain HTTP on the local network.
# The nginx proxy machine connects here from the internal network.
#
# Start/stop via:  rc-service claude-dashboard start
#
# After installing:
#   1. Create /usr/share/claude-dashboard/config.yaml (see config.yaml.sample)
#   2. rc-update add claude-dashboard
#   3. rc-update add claude-dashboard-ws
#   4. rc-service claude-dashboard start
#   5. rc-service claude-dashboard-ws start

user nginx;
worker_processes 1;

pid /run/claude-dashboard.pid;
error_log /var/log/claude-dashboard/error.log;

events {
  worker_connections 64;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /var/log/claude-dashboard/access.log;

  sendfile on;
  keepalive_timeout 30;

  server {
    # Internal-only: serve on all interfaces, port 8042.
    # The proxy machine connects from the local network.
    # No TLS here — the proxy machine terminates HTTPS.
    listen 8042;
    listen [::]:8042;

    server_name _;

    root /usr/share/claude-dashboard/www;
    index index.html;

    charset utf-8;

    # Security headers (defence in depth even behind a proxy)
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy
      "default-src 'self'; style-src 'self'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self';"
      always;

    location / {
      try_files $uri $uri/ =404;
    }

    # WebSocket autoreload (issue #9).
    # ws-server.py listens on port 8043; nginx upgrades HTTP → WebSocket.
    location = /ws {
      proxy_pass http://127.0.0.1:8043;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # WASM needs correct MIME type and COOP/COEP for streaming compilation.
    location ~* \.wasm$ {
      add_header Content-Type application/wasm;
      add_header Cross-Origin-Opener-Policy same-origin;
      add_header Cross-Origin-Embedder-Policy require-corp;
      expires 10m;
    }

    # CBOR data — short cache so the page picks up fresh data.
    location = /data.cbor {
      add_header Content-Type application/cbor;
      expires 60s;
      add_header Cache-Control "public, max-age=60";
    }

    # Static assets — moderate cache.
    location ~* \.(css|js|png|ico|woff2?)$ {
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    # Deny dotfiles.
    location ~ /\. {
      deny all;
    }
  }
}
