# nginx/dashboard.conf
# Nginx server block for the Claude Dashboard.
#
# Deploy: symlink or copy this file into /etc/nginx/sites-enabled/ on the
# machine that proxies the dashboard.  Adjust the variables below.

# Variables to set in your nginx config (or replace inline):
#   DASHBOARD_ROOT  — absolute path to the www/ directory, e.g.
#                     /home/maria/claude/claude-dashboard/www
#   DASHBOARD_HOST  — hostname the dashboard is served on, e.g. dashboard.local
#   DASHBOARD_PORT  — TCP port to listen on (default: 8042)

server {
  listen 8042;
  # listen [::]:8042;  # uncomment for IPv6

  server_name dashboard.local;

  root /home/maria/claude/claude-dashboard/www;
  index index.html;

  # Charset
  charset utf-8;

  # Security headers (read-only dashboard, no forms)
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy strict-origin-when-cross-origin;
  add_header Content-Security-Policy
    "default-src 'self'; style-src 'self'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self';"
    always;

  # Serve the pre-generated index
  location / {
    try_files $uri $uri/ =404;
  }

  # WASM needs the correct MIME type for SharedArrayBuffer / streaming compile
  location ~* \.wasm$ {
    add_header Content-Type application/wasm;
    # Allow WASM streaming compilation
    add_header Cross-Origin-Opener-Policy same-origin;
    add_header Cross-Origin-Embedder-Policy require-corp;
    expires 10m;
  }

  # CBOR data file — short cache so the page picks up fresh data
  location = /data.cbor {
    add_header Content-Type application/cbor;
    expires 60s;
    add_header Cache-Control "public, max-age=60";
  }

  # Static assets — moderate cache
  location ~* \.(css|js|png|ico|woff2?)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # Deny dotfiles
  location ~ /\. {
    deny all;
  }
}
