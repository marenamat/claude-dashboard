# nginx/proxy.conf — nginx site config for the proxy machine.
# Exposes the Claude Dashboard over HTTPS, proxying to the clankers machine.
#
# Deploy: symlink into /etc/nginx/sites-enabled/ on the proxy machine.
# Then reload nginx: nginx -s reload
#
# Adjust all lines marked CONFIGURE before deploying.

# CONFIGURE: set to the IP or hostname of the clankers machine on the local network.
upstream claude_dashboard {
  server 192.168.0.10:8042;
}

# Redirect plain HTTP to HTTPS.
server {
  listen 80;
  listen [::]:80;

  # CONFIGURE: your dashboard hostname.
  server_name dashboard.example.com;

  return 301 https://$host$request_uri;
}

# HTTPS proxy.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # CONFIGURE: your dashboard hostname.
  server_name dashboard.example.com;

  # CONFIGURE: TLS certificate and key paths (e.g. from certbot / Let's Encrypt).
  ssl_certificate     /etc/ssl/certs/dashboard.crt;
  ssl_certificate_key /etc/ssl/private/dashboard.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers.
  add_header Strict-Transport-Security "max-age=63072000" always;
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;

  location / {
    proxy_pass http://claude_dashboard;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # WebSocket autoreload (issue #9).
  # Passes Upgrade headers through to the clankers machine, where nginx
  # forwards them on to ws-server.py.
  location = /ws {
    proxy_pass http://claude_dashboard;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }
}
